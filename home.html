<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bucks2Bar</title>

    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

    <style>
        body {
            background-color: #f0f4f8;
        }

        .app-header {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: #fff;
            padding: 1.25rem 1.5rem;
            border-radius: 0 0 12px 12px;
            margin-bottom: 1.5rem;
        }

        .app-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .nav-tabs .nav-link {
            font-weight: 600;
            color: #1a73e8;
        }

        .nav-tabs .nav-link.active {
            color: #0d47a1;
            border-bottom: 3px solid #1a73e8;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.09);
        }

        .table th {
            background-color: #e8f0fe;
            color: #1a237e;
        }

        input[type="number"].is-invalid {
            border-color: #dc3545;
            background-image: none;
        }

        .chart-wrapper {
            position: relative;
            height: 420px;
        }

        .btn-primary {
            background-color: #e91e63;
            border-color: #e91e63;
            color: #fff;
        }

        .btn-primary:hover,
        .btn-primary:focus,
        .btn-primary:active,
        .btn-primary:focus-visible {
            background-color: #c2185b;
            border-color: #c2185b;
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="app-header text-center">
        <h1>&#128184; Bucks2Bar</h1>
        <p class="mb-0 opacity-75">Monthly Income &amp; Expense Tracker</p>
    </div>

    <div class="container pb-5">

        <!-- Username Section -->
        <div class="row justify-content-center mb-4">
            <div class="col-md-6">
                <div class="card p-3">
                    <div>
                        <label for="usernameInput" class="form-label fw-semibold">Username</label>
                        <input type="text" id="usernameInput" class="form-control" placeholder="Enter username"
                            aria-describedby="usernameHelp usernameFeedback" />
                        <div id="usernameHelp" class="form-text">
                            At least 5 characters, 1 uppercase letter, and 1 special character.
                        </div>
                        <div id="usernameFeedback" class="invalid-feedback"></div>
                        <button id="submitUsername" class="btn btn-primary mt-2" type="button">Submit</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-3" id="mainTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="data-tab" data-bs-toggle="tab" data-bs-target="#data-panel"
                    type="button" role="tab" aria-controls="data-panel" aria-selected="true">&#128203; Data</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="chart-tab" data-bs-toggle="tab" data-bs-target="#chart-panel" type="button"
                    role="tab" aria-controls="chart-panel" aria-selected="false">&#128202; Chart</button>
            </li>
        </ul>

        <!-- Tab panels -->
        <div class="tab-content">

            <!-- DATA TAB -->
            <div class="tab-pane fade show active" id="data-panel" role="tabpanel" aria-labelledby="data-tab">
                <div class="card p-3">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0" id="dataTable">
                            <thead>
                                <tr>
                                    <th style="width:140px">Month</th>
                                    <th>Income ($)</th>
                                    <th>Expense ($)</th>
                                </tr>
                            </thead>
                            <tbody id="inputBody">
                                <!-- Rows injected by script.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- CHART TAB -->
            <div class="tab-pane fade" id="chart-panel" role="tabpanel" aria-labelledby="chart-tab">
                <div class="card p-4">
                    <div class="d-flex justify-content-end mb-3">
                        <button id="downloadChart" class="btn btn-primary" type="button">Download Chart as PNG</button>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
            </div>


        </div><!-- /tab-content -->
    </div><!-- /container -->

    <!-- Bootstrap 5 JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- App logic -->
    <script src="script.js" defer></script>

</body>

</html>
